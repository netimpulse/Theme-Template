# Shopify CLI – Theme-Konfiguration
#
# Das development-Environment zeigt auf das QA-Preview-Theme im Dev-Store.
# Dieses Theme ist NICHT an die GitHub-Integration gebunden — es wird
# ausschliesslich via Shopify CLI aus dem aktuellen Branch heraus aktualisiert,
# damit der QA-Workflow auch dann funktioniert, wenn Claude Code Web seine
# Aenderungen erst auf einer PR-Branch hat (also bevor sie in main gemerged sind).
#
# Das GitHub-verbundene Theme bleibt unberuehrt und bildet weiterhin den
# aktuellen Stand von main ab.

[environments.development]
store = "dev-store-4ogqgshg.myshopify.com"
theme = "145381884019"

# Production-Block wird pro Kundenshop ergaenzt:
# [environments.production]
# store = "kunde-x.myshopify.com"
# theme = "__PROD_THEME_ID__"

ignore = [
  "templates/page.qa-*.json",
  "tests/**",
  "playwright.config.ts",
  "